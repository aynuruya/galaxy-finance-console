<!DOCTYPE html>
<html>
<head>
<title>Noor's Cosmic Finance Console</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Segoe UI, sans-serif;
  color: white;
  overflow: hidden;
}

#galaxyCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  display: block;
}

.container {
  position: relative;
  z-index: 100;
  background: rgba(8,8,20,0.50);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 25px;
  width: min(480px, 95vw); 
  padding: 35px;
  box-shadow: 0 0 30px rgba(240,240,255,0.3), 0 0 80px rgba(210,160,120,0.3);
  animation: floatConsole 8s ease-in-out infinite, consoleGlow 6s ease-in-out infinite;
}

.clock {
  text-align: center;
  font-size: 20px;
  letter-spacing: 2px;
  color: #f0f0ff;
  margin-bottom: 15px;
  text-shadow: 0 0 15px #f0f0ff;
}

.mode-buttons {
  text-align: center;
  margin-bottom: 15px;
}

.mode-buttons button {
  padding: 8px 14px;
  margin: 5px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(20,20,40,0.6);
  color: #f0f0ff;
  cursor: pointer;
  transition: 0.3s;
  font-family: Segoe UI, sans-serif;
  font-size: 13px;
}

.mode-buttons button:hover,
.mode-buttons button.active {
  box-shadow: 0 0 10px #f0f0ff, 0 0 25px #f0f0ff;
  background: rgba(240,240,255,0.1);
}

input[type="text"], input[disabled] {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: black;
  color: #f0f0ff;
  font-size: 20px;
  text-align: right;
  margin-bottom: 8px;
  box-shadow: inset 0 0 10px #000;
  box-sizing: border-box;
}

.display-expr {
  width: 100%;
  padding: 4px 12px;
  font-size: 12px;
  color: rgba(240,240,255,0.4);
  text-align: right;
  min-height: 18px;
  letter-spacing: 1px;
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

input[type="number"] {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: black;
  color: #f0f0ff;
  font-size: 16px;
  margin-bottom: 10px;
  box-shadow: inset 0 0 10px #000;
  box-sizing: border-box;
  outline: none;
}

select {
  width: 100%;
  padding: 10px 12px;
  border: none;
  border-radius: 10px;
  background: black;
  color: #f0f0ff;
  font-size: 14px;
  margin-bottom: 10px;
  box-sizing: border-box;
  outline: none;
  cursor: pointer;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.calc-btn {
  padding: 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(25,25,50,0.7);
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
  font-family: Segoe UI, sans-serif;
  box-shadow: 0 0 5px rgba(240,240,255,0.2), inset 0 0 5px rgba(255,255,255,0.05);

  /* ADD THESE 👇 */
  position: relative;
  overflow: hidden;
}

  .ripple {
  position: absolute;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(240,240,255,0.6) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  border-radius: 50%;
  animation: rippleAnim 0.5s ease-out;
  pointer-events: none;
}

@keyframes rippleAnim {
  from { transform: translate(-50%, -50%) scale(0.2); opacity: 1; }
  to   { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
}

.calc-btn:hover {
  color: #f0f0ff;
  box-shadow: 0 0 10px #f0f0ff, 0 0 25px #f0f0ff, 0 0 40px #f0f0ff;
}

.calc-btn:active { transform: scale(0.93); }

.btn-clear { color: #e8956d; }
.btn-clear:hover { box-shadow: 0 0 10px #e8956d, 0 0 25px #e8956d !important; color: #e8956d; }
.btn-eq { color: #f0f0ff; background: rgba(240,240,255,0.1); }
.btn-fn { color: #f0c9b0; font-size: 13px; }
.btn-fn:hover { box-shadow: 0 0 10px #e8956d, 0 0 25px #e8956d !important; color: #e8956d; }

.result {
  margin-top: 10px;
  text-align: center;
  color: #e8956d;
  text-shadow: 0 0 10px #e8956d;
}

.history-wrap {
  margin-top: 10px;
  border-top: 1px solid rgba(240,240,255,0.15);
  padding-top: 8px;
  max-height: 70px;
  overflow-y: auto;
}
.history-wrap::-webkit-scrollbar { width: 3px; }
.history-wrap::-webkit-scrollbar-thumb { background: #c8785a; border-radius: 2px; }
.history-label { font-size: 11px; color: rgba(240,240,255,0.3); letter-spacing: 2px; margin-bottom: 3px; }
.history-item { font-size: 11px; color: rgba(240,240,255,0.4); text-align: right; padding: 1px 0; cursor: pointer; }
.history-item:hover { color: #f0f0ff; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.hidden { display: none !important; }

.particle {
  position: fixed;
  width: 3px; height: 3px;
  background: #f0f0ff;
  border-radius: 50%;
  opacity: 0.6;
  pointer-events: none;
  z-index: 50;
  animation: particleMove linear infinite;
}

@keyframes particleMove {
  from { transform: translateY(100vh); }
  to   { transform: translateY(-10vh); }
}

@keyframes floatConsole {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

@keyframes consoleGlow {
  0%   { box-shadow: 0 0 20px rgba(240,240,255,0.25), 0 0 60px rgba(210,160,120,0.25); }
  50%  { box-shadow: 0 0 35px rgba(240,240,255,0.55), 0 0 120px rgba(210,160,120,0.55); }
  100% { box-shadow: 0 0 20px rgba(240,240,255,0.25), 0 0 60px rgba(210,160,120,0.25); }
}

</style>
</head>
<body>

<canvas id="galaxyCanvas"></canvas>

<div class="container">

  <div class="clock" id="clock"></div>

  <div class="mode-buttons">
    <button onclick="showMode('calc',this)" class="active">Calculator</button>
    <button onclick="showMode('sci',this)">Scientific</button>
    <button onclick="showMode('compound',this)">Compound 💸</button>
    <button onclick="showMode('fx',this)">FX 💱</button>
  </div>

  <!-- BASIC CALC -->
  <div id="mode-calc">
    <div class="display-expr" id="expr">&nbsp;</div>
    <input type="text" id="display" disabled value="0">
    <div class="buttons">
      <button class="calc-btn btn-clear" onclick="clearAll()">AC</button>
      <button class="calc-btn btn-clear" onclick="backspace()">&#x232B;</button>
      <button class="calc-btn" onclick="appendVal('%')">%</button>
      <button class="calc-btn" onclick="appendVal('/')">&#247;</button>
      <button class="calc-btn" onclick="appendVal('7')">7</button>
      <button class="calc-btn" onclick="appendVal('8')">8</button>
      <button class="calc-btn" onclick="appendVal('9')">9</button>
      <button class="calc-btn" onclick="appendVal('*')">&#215;</button>
      <button class="calc-btn" onclick="appendVal('4')">4</button>
      <button class="calc-btn" onclick="appendVal('5')">5</button>
      <button class="calc-btn" onclick="appendVal('6')">6</button>
      <button class="calc-btn" onclick="appendVal('-')">&#8722;</button>
      <button class="calc-btn" onclick="appendVal('1')">1</button>
      <button class="calc-btn" onclick="appendVal('2')">2</button>
      <button class="calc-btn" onclick="appendVal('3')">3</button>
      <button class="calc-btn" onclick="appendVal('+')">+</button>
      <button class="calc-btn" onclick="appendVal('0')" style="grid-column:span 2;">0</button>
      <button class="calc-btn" onclick="appendVal('.')">.</button>
      <button class="calc-btn btn-eq" onclick="calculate()">=</button>
    </div>
    <div class="history-wrap">
      <div class="history-label">// HISTORY</div>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- SCIENTIFIC -->
  <div id="mode-sci" class="hidden">
    <div class="display-expr" id="sci-expr">&nbsp;</div>
    <input type="text" id="sci-display" disabled value="0">
    <div class="buttons">
      <button class="calc-btn btn-clear" onclick="sciClear()">AC</button>
      <button class="calc-btn btn-clear" onclick="sciBackspace()">&#x232B;</button>
      <button class="calc-btn btn-fn" onclick="sciFunc('sqrt')">&#x221A;</button>
      <button class="calc-btn" onclick="sciAppend('/')">&#247;</button>
      <button class="calc-btn btn-fn" onclick="sciFunc('sin')">sin</button>
      <button class="calc-btn btn-fn" onclick="sciFunc('cos')">cos</button>
      <button class="calc-btn btn-fn" onclick="sciFunc('tan')">tan</button>
      <button class="calc-btn" onclick="sciAppend('*')">&#215;</button>
      <button class="calc-btn btn-fn" onclick="sciFunc('log')">log</button>
      <button class="calc-btn btn-fn" onclick="sciFunc('ln')">ln</button>
      <button class="calc-btn btn-fn" onclick="sciAppend('**2')">x&#178;</button>
      <button class="calc-btn" onclick="sciAppend('-')">&#8722;</button>
      <button class="calc-btn btn-fn" onclick="sciInsertPi()">&#x3C0;</button>
      <button class="calc-btn btn-fn" onclick="sciToggleSign()">+/&#8722;</button>
      <button class="calc-btn" onclick="sciAppend('%')">%</button>
      <button class="calc-btn" onclick="sciAppend('+')">+</button>
      <button class="calc-btn" onclick="sciAppend('7')">7</button>
      <button class="calc-btn" onclick="sciAppend('8')">8</button>
      <button class="calc-btn" onclick="sciAppend('9')">9</button>
      <button class="calc-btn" onclick="sciAppend('4')">4</button>
      <button class="calc-btn" onclick="sciAppend('5')">5</button>
      <button class="calc-btn" onclick="sciAppend('6')">6</button>
      <button class="calc-btn" onclick="sciAppend('1')">1</button>
      <button class="calc-btn" onclick="sciAppend('2')">2</button>
      <button class="calc-btn" onclick="sciAppend('3')">3</button>
      <button class="calc-btn" onclick="sciAppend('0')" style="grid-column:span 2;">0</button>
      <button class="calc-btn btn-eq" onclick="sciCalculate()">=</button>
    </div>
  </div>

  <!-- COMPOUND -->
  <div id="mode-compound" class="hidden">
    <input type="number" id="cp-principal" placeholder="Principal &#8377;">
    <div class="two-col">
      <input type="number" id="cp-rate" placeholder="Rate %">
      <input type="number" id="cp-years" placeholder="Years">
    </div>
    <select id="cp-freq">
      <option value="1">Annually</option>
      <option value="4">Quarterly</option>
      <option value="12" selected>Monthly</option>
      <option value="365">Daily</option>
    </select>
    <button class="calc-btn" onclick="calcCompound()" style="width:100%;margin-bottom:10px;">Calculate Growth</button>
    <div class="result" id="compoundResult"></div>
  </div>

  <!-- FX -->
  <div id="mode-fx" class="hidden">
    <input type="number" id="fx-amount" placeholder="Amount">
    <div class="two-col">
      <select id="fx-from">
        <option value="INR" selected>INR &#8377;</option>
        <option value="USD">USD $</option>
        <option value="EUR">EUR &#8364;</option>
        <option value="GBP">GBP &#163;</option>
        <option value="JPY">JPY &#165;</option>
        <option value="AED">AED</option>
        <option value="CAD">CAD C$</option>
        <option value="AUD">AUD A$</option>
        <option value="SGD">SGD S$</option>
      </select>
      <select id="fx-to">
        <option value="USD" selected>USD $</option>
        <option value="INR">INR &#8377;</option>
        <option value="EUR">EUR &#8364;</option>
        <option value="GBP">GBP &#163;</option>
        <option value="JPY">JPY &#165;</option>
        <option value="AED">AED</option>
        <option value="CAD">CAD C$</option>
        <option value="AUD">AUD A$</option>
        <option value="SGD">SGD S$</option>
      </select>
    </div>
    <button class="calc-btn" onclick="convertFX()" style="width:100%;margin-bottom:10px;">Convert</button>
    <div class="result" id="fx-result"></div>
  </div>

</div>

<script>

/* CLOCK */
function updateClock(){
  document.getElementById("clock").textContent = new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

/* PARTICLES */
for(var i=0;i<20;i++){
  var p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(5+Math.random()*15)+"s";
  document.body.appendChild(p);
}

/* MODE SWITCH */
function showMode(mode,btn){
  ['calc','sci','compound','fx'].forEach(function(m){
    document.getElementById('mode-'+m).classList.add('hidden');
  });
  document.querySelectorAll('.mode-buttons button').forEach(function(b){b.classList.remove('active');});
  document.getElementById('mode-'+mode).classList.remove('hidden');
  btn.classList.add('active');
}

/* BASIC CALC */
var expr='',justCalc=false;
function updateDisplay(val,exprVal){
  document.getElementById('display').value=val||'0';
  document.getElementById('expr').textContent=exprVal||'\u00a0';
}
function appendVal(v){
  if(justCalc&&(v>='0'&&v<='9'||v==='.'))expr='';
  justCalc=false;
  if(v==='%'){try{expr=String(eval(expr)/100);}catch(e){expr+='/100';}}
  else expr+=v;
  updateDisplay(expr.replace(/\*/g,'×').replace(/\//g,'÷'),'');
}
function clearAll(){expr='';justCalc=false;updateDisplay('0','');}
function backspace(){
  if(justCalc){clearAll();return;}
  expr=expr.slice(0,-1);
  updateDisplay(expr.replace(/\*/g,'×').replace(/\//g,'÷')||'0','');
}
  
function calculate(){
  if(!expr){
    updateDisplay('0','');
    return;
  }

  try{
    let prev = expr;

    let result = eval(expr); // simpler + stable for now

    if (!isFinite(result)) throw "Math error";

    result = parseFloat(result.toFixed(10));

    if(typeof addHistory === "function"){
      addHistory(prev.replace(/\*/g,'×').replace(/\//g,'÷') + ' = ' + result);
    }

    updateDisplay(String(result), prev.replace(/\*/g,'×').replace(/\//g,'÷'));

    expr = String(result);
    justCalc = true;

  } catch(e){
    updateDisplay('Error','');
    expr='';
  }
}
  function addHistory(item){
  let list = document.getElementById("historyList");

  if(!list) return; // safety

  let div = document.createElement("div");
  div.className = "history-item";
  div.textContent = item;

  div.onclick = () => {
    expr = item.split("=")[0].trim();
    updateDisplay(expr, '');
  };

  list.prepend(div);

  if(list.children.length > 10){
    list.removeChild(list.lastChild);
  }
}
  
/* SCIENTIFIC */
var sciExpr='',sciJustCalc=false;
function sciUpdateDisplay(val,exp){
  document.getElementById('sci-display').value=val||'0';
  document.getElementById('sci-expr').textContent=exp||'\u00a0';
}
function sciAppend(v){
  if(sciJustCalc&&(v>='0'&&v<='9'||v==='.'))sciExpr='';
  sciJustCalc=false;
  if(v==='%'){try{sciExpr=String(eval(sciExpr)/100);}catch(e){sciExpr+='/100';}}
  else sciExpr+=v;
  sciUpdateDisplay(sciExpr.replace(/\*/g,'×').replace(/\//g,'÷'),'');
}
function sciFunc(fn){
  sciJustCalc=false;
  try{
    var val=parseFloat(Function('"use strict";return('+sciExpr+')')());
    var result;
    if(fn==='sin') result=Math.sin(val*Math.PI/180);
    else if(fn==='cos') result=Math.cos(val*Math.PI/180);
    else if(fn==='tan') result=Math.tan(val*Math.PI/180);
    else if(fn==='log') result=Math.log10(val);
    else if(fn==='ln')  result=Math.log(val);
    else if(fn==='sqrt')result=Math.sqrt(val);
    result=parseFloat(result.toFixed(10));
    sciExpr=String(result);
    sciUpdateDisplay(String(result),fn+'('+val+')');
    sciJustCalc=true;
  }catch(e){sciUpdateDisplay('Error','');}
}
function sciInsertPi(){sciExpr+=Math.PI;sciUpdateDisplay(sciExpr,'');}
function sciToggleSign(){sciExpr=sciExpr.startsWith('-')?sciExpr.slice(1):'-'+sciExpr;sciUpdateDisplay(sciExpr,'');}
function sciClear(){sciExpr='';sciJustCalc=false;sciUpdateDisplay('0','');}
function sciBackspace(){
  if(sciJustCalc){sciClear();return;}
  sciExpr=sciExpr.slice(0,-1);
  sciUpdateDisplay(sciExpr.replace(/\*/g,'×').replace(/\//g,'÷')||'0','');
}
function sciCalculate(){
  if(!sciExpr)return;
  try{
    var result=Function('"use strict";return('+sciExpr+')')();
    result=parseFloat(result.toFixed(10));
    sciExpr=String(result);sciUpdateDisplay(String(result),'');sciJustCalc=true;
  }catch(e){sciUpdateDisplay('Error','');sciExpr='';}
}

/* COMPOUND */
function calcCompound(){
  var p=parseFloat(document.getElementById('cp-principal').value);
  var r=parseFloat(document.getElementById('cp-rate').value)/100;
  var t=parseFloat(document.getElementById('cp-years').value);
  var n=parseInt(document.getElementById('cp-freq').value);
  var el=document.getElementById('compoundResult');
  if(isNaN(p)||isNaN(r)||isNaN(t)){el.innerHTML='Enter valid values';return;}
  var A=p*Math.pow(1+r/n,n*t);
  var gain=A-p;
  el.innerHTML='Future Value: &#8377; '+A.toLocaleString('en-IN',{maximumFractionDigits:2})+'<br><small>&#9650; &#8377;'+gain.toLocaleString('en-IN',{maximumFractionDigits:2})+' gain</small>';
  el.style.transform='scale(1.1)';el.style.transition='0.4s';
  setTimeout(function(){el.style.transform='scale(1)';},400);
}

/* FX */
var FX={USD:1,EUR:0.92,GBP:0.79,INR:83.5,JPY:150.2,AED:3.67,CAD:1.36,AUD:1.53,SGD:1.34};
function convertFX(){
  var amount=parseFloat(document.getElementById('fx-amount').value);
  var from=document.getElementById('fx-from').value;
  var to=document.getElementById('fx-to').value;
  var el=document.getElementById('fx-result');
  if(isNaN(amount)){el.innerHTML='Enter a valid amount';return;}
  var result=(amount/FX[from])*FX[to];
  var rate=(FX[to]/FX[from]).toFixed(4);
  el.innerHTML=result.toLocaleString(undefined,{maximumFractionDigits:4})+' '+to+'<br><small>1 '+from+' &#8776; '+rate+' '+to+'</small>';
}

/* KEYBOARD */
document.addEventListener('keydown',function(e){
  var isSci=!document.getElementById('mode-sci').classList.contains('hidden');
  var isCalc=!document.getElementById('mode-calc').classList.contains('hidden');
  if(!isCalc&&!isSci)return;
  var ap=isSci?sciAppend:appendVal;
  var cal=isSci?sciCalculate:calculate;
  var cl=isSci?sciClear:clearAll;
  var bk=isSci?sciBackspace:backspace;
  if(e.key>='0'&&e.key<='9')ap(e.key);
  else if(e.key==='.')ap('.');
  else if(e.key==='+')ap('+');
  else if(e.key==='-')ap('-');
  else if(e.key==='*')ap('*');
  else if(e.key==='/'){e.preventDefault();ap('/');}
  else if(e.key==='%')ap('%');
  else if(e.key==='Enter'||e.key==='=')cal();
  else if(e.key==='Backspace')bk();
  else if(e.key==='Escape')cl();
});

/* ============================
   GALAXY BACKGROUND
   ============================ */
(function(){
  var cv=document.getElementById('galaxyCanvas');
  var cx=cv.getContext('2d');
  var W,H,stars=[],shooters=[];

  function resize(){
    W=cv.width=window.innerWidth;
    H=cv.height=window.innerHeight;
    buildStars();
  }

  var sd=99;
  function rnd(){sd=(sd*1664525+1013904223)>>>0;return sd/4294967295;}

  function buildStars(){
    sd=99;stars=[];
    var total = Math.min(2500, Math.floor(W*H/300));
    for(var i=0;i<total;i++){
      var inBand=rnd()<0.62;
      var x,y;
      if(inBand){
        var tt=rnd();
        var bx=W*(0.12+tt*0.76);
        var by=H*(0.80-tt*0.60);
        x=bx+(rnd()-0.5)*W*0.32;
        y=by+(rnd()-0.5)*H*0.22;
      }else{x=rnd()*W;y=rnd()*H;}
      var br=rnd();
      var sz=br<0.82?rnd()*0.75+0.15:rnd()*1.8+0.7;
      var tp=rnd();
      var r,g,b;
      if(tp<0.42){r=200+rnd()*55;g=220+rnd()*35;b=255;}
      else if(tp<0.65){r=255;g=245+rnd()*10;b=215+rnd()*40;}
      else if(tp<0.80){r=255;g=185+rnd()*55;b=100+rnd()*90;}
      else{r=185+rnd()*70;g=165+rnd()*70;b=255;}
      stars.push({x:x,y:y,sz:sz,r:r|0,g:g|0,b:b|0,
        alpha:0.18+br*0.82,sp:0.3+rnd()*2.5,
        ph:rnd()*Math.PI*2,big:sz>1.2&&br>0.6});
    }
  }

  function frame(now){
    var t=now*0.001;
    cx.clearRect(0,0,W,H);

    /* deep space */
    cx.fillStyle='#000008';
    cx.fillRect(0,0,W,H);

    /* soft galaxy core glow */
var core = cx.createRadialGradient(W*0.5, H*0.5, 0, W*0.5, H*0.5, W*0.6);
core.addColorStop(0, 'rgba(120, 80, 255, 0.25)');
core.addColorStop(0.4, 'rgba(80, 40, 160, 0.15)');
core.addColorStop(1, 'rgba(0,0,0,0)');
cx.fillStyle = core;
cx.fillRect(0, 0, W, H);


    /* galactic core */
    var gx=W*0.43,gy=H*0.52;
    var core=cx.createRadialGradient(gx,gy,0,gx,gy,W*0.28);
    core.addColorStop(0,'rgba(255,195,110,0.30)');
    core.addColorStop(0.20,'rgba(210,145,255,0.20)');
    core.addColorStop(0.50,'rgba(70,30,160,0.10)');
    core.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=core;cx.fillRect(0,0,W,H);

    /* nebula clouds */
    var nbs=[
      {ox:0.20,oy:0.58,rx:W*0.14,ry:H*0.11,r:110,g:30,b:255,a:0.11,s:0.009},
      {ox:0.62,oy:0.34,rx:W*0.12,ry:H*0.09,r:0,g:175,b:255,a:0.10,s:0.007},
      {ox:0.48,oy:0.64,rx:W*0.10,ry:H*0.08,r:255,g:50,b:155,a:0.09,s:0.011},
      {ox:0.32,oy:0.26,rx:W*0.09,ry:H*0.07,r:50,g:255,b:190,a:0.08,s:0.008},
      {ox:0.76,oy:0.67,rx:W*0.11,ry:H*0.08,r:195,g:90,b:255,a:0.09,s:0.006}
    ];
    nbs.forEach(function(n){
      var nx=W*n.ox+Math.sin(t*n.s*1.4)*W*0.018;
      var ny=H*n.oy+Math.cos(t*n.s)*H*0.022;
      var pulse=0.8+0.2*Math.sin(t*n.s*2);
      var ng=cx.createRadialGradient(nx,ny,0,nx,ny,n.rx);
      ng.addColorStop(0,'rgba('+n.r+','+n.g+','+n.b+','+(n.a*pulse*2.2).toFixed(3)+')');
      ng.addColorStop(0.5,'rgba('+n.r+','+n.g+','+n.b+','+(n.a*pulse).toFixed(3)+')');
      ng.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=ng;
      cx.beginPath();cx.ellipse(nx,ny,n.rx,n.ry,n.ox*1.1,0,Math.PI*2);cx.fill();
    });

    /* dust lane */
    cx.save();cx.globalCompositeOperation='multiply';
    var dl=cx.createLinearGradient(W*0.1,H*0.70,W*0.62,H*0.24);
    dl.addColorStop(0,'rgba(0,0,0,0)');
    dl.addColorStop(0.45,'rgba(0,0,10,0.65)');
    dl.addColorStop(0.55,'rgba(0,0,10,0.65)');
    dl.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=dl;
    cx.beginPath();cx.ellipse(W*0.39,H*0.49,W*0.31,H*0.044,-0.50,0,Math.PI*2);cx.fill();
    cx.restore();

    /* stars */
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      var tw=0.5+0.5*Math.sin(t*s.sp+s.ph);
      var a=s.alpha*tw;
      if(s.big&&Math.random()>0.4){
        var bloom=cx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.sz*7);
        bloom.addColorStop(0,'rgba('+s.r+','+s.g+','+s.b+','+(a*0.50).toFixed(3)+')');
        bloom.addColorStop(1,'rgba(0,0,0,0)');
        cx.fillStyle=bloom;
        cx.beginPath();cx.arc(s.x,s.y,s.sz*7,0,Math.PI*2);cx.fill();
        cx.strokeStyle='rgba('+s.r+','+s.g+','+s.b+','+(a*0.28).toFixed(3)+')';
        cx.lineWidth=0.5;
        cx.beginPath();cx.moveTo(s.x-s.sz*5,s.y);cx.lineTo(s.x+s.sz*5,s.y);cx.stroke();
        cx.beginPath();cx.moveTo(s.x,s.y-s.sz*5);cx.lineTo(s.x,s.y+s.sz*5);cx.stroke();
      }

      /* star glow */
var glow = cx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.sz * 4);
glow.addColorStop(0, 'rgba('+s.r+','+s.g+','+s.b+','+(a*0.8)+')');
glow.addColorStop(1, 'rgba(0,0,0,0)');
cx.fillStyle = glow;
cx.beginPath();
cx.arc(s.x, s.y, s.sz * 4, 0, Math.PI * 2);
cx.fill();

/* core star */
cx.beginPath();
cx.arc(s.x, s.y, s.sz, 0, Math.PI * 2);
cx.fillStyle = 'rgba('+s.r+','+s.g+','+s.b+','+a+')';
cx.fill();
    }

    /* shooting stars */
    if(Math.random()<0.002&&shooters.length<2){
      var ang=0.15+Math.random()*0.40;
      shooters.push({
        x:W*(0.05+Math.random()*0.85),y:H*(0.02+Math.random()*0.38),
        vx:Math.cos(ang)*(8+Math.random()*11),vy:Math.sin(ang)*(3+Math.random()*7),
        life:1.0,decay:0.013+Math.random()*0.020,len:110+Math.random()*170
      });
    }
    shooters=shooters.filter(function(s){return s.life>0;});
    shooters.forEach(function(s){
      var tx=s.x-s.vx*(s.len/13),ty=s.y-s.vy*(s.len/13);
      var sg=cx.createLinearGradient(tx,ty,s.x,s.y);
      sg.addColorStop(0,'rgba(255,255,255,0)');
      sg.addColorStop(0.5,'rgba(200,235,255,'+(s.life*0.55).toFixed(2)+')');
      sg.addColorStop(1,'rgba(255,255,255,'+(s.life*0.95).toFixed(2)+')');
      cx.strokeStyle=sg;cx.lineWidth=1.8*s.life;cx.lineCap='round';
      cx.beginPath();cx.moveTo(tx,ty);cx.lineTo(s.x,s.y);cx.stroke();
      s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;
    });

}

  let lastTime = performance.now();
const fps = 45; // smooth but lighter
const interval = 1000 / fps;

function animate(now){
  if (now - lastTime > interval){
    lastTime = now;
    frame(now);
  }
  requestAnimationFrame(animate);
}  

  window.addEventListener('resize',resize);
  resize();
  requestAnimationFrame(animate);
})();

  document.querySelectorAll('.calc-btn').forEach(btn => {
  btn.addEventListener('click', function(e){
    let ripple = document.createElement("span");
    ripple.className = "ripple";
    this.appendChild(ripple);

    let rect = this.getBoundingClientRect();
    ripple.style.left = (e.clientX - rect.left) + "px";
    ripple.style.top = (e.clientY - rect.top) + "px";

    setTimeout(() => ripple.remove(), 500);
  });
});

</script>
</body>
