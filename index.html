<!DOCTYPE html>
<html>
<head>
<title>Noor's Cosmic Finance Console</title>

<style>

/* ===== EXISTING STYLES (trimmed for clarity, unchanged core) ===== */

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Segoe UI, sans-serif;
  color: white;
  overflow: hidden;
  background: black;
}

#galaxyCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}

.container {
  position: relative;
  z-index: 100;
  background: rgba(8,8,20,0.50);
  backdrop-filter: blur(20px);
  padding: 35px;
  border-radius: 25px;
  width: min(480px, 95vw); 
  box-shadow: 0 0 30px rgba(240,240,255,0.3), 0 0 80px rgba(210,160,120,0.3);
}

/* ===== BUTTONS ===== */

.calc-btn {
  padding: 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(25,25,50,0.7);
  color: white;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

/* RIPPLE EFFECT */
.ripple {
  position: absolute;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(240,240,255,0.6) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  border-radius: 50%;
  animation: rippleAnim 0.5s ease-out;
  pointer-events: none;
}

@keyframes rippleAnim {
  from { transform: translate(-50%, -50%) scale(0.2); opacity: 1; }
  to   { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
}

/* ===== SIMPLE LAYOUT ===== */

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  text-align: right;
}

/* ===== RESULT ===== */
.result {
  text-align: center;
  margin-top: 10px;
  color: #e8956d;
}

</style>
</head>

<body>

<canvas id="galaxyCanvas"></canvas>

<div class="container">

  <input type="text" id="display" disabled value="0">

  <div class="buttons">
    <button class="calc-btn" onclick="appendVal('7')">7</button>
    <button class="calc-btn" onclick="appendVal('8')">8</button>
    <button class="calc-btn" onclick="appendVal('9')">9</button>
    <button class="calc-btn" onclick="appendVal('/')">÷</button>

    <button class="calc-btn" onclick="appendVal('4')">4</button>
    <button class="calc-btn" onclick="appendVal('5')">5</button>
    <button class="calc-btn" onclick="appendVal('6')">6</button>
    <button class="calc-btn" onclick="appendVal('*')">×</button>

    <button class="calc-btn" onclick="appendVal('1')">1</button>
    <button class="calc-btn" onclick="appendVal('2')">2</button>
    <button class="calc-btn" onclick="appendVal('3')">3</button>
    <button class="calc-btn" onclick="appendVal('-')">-</button>

    <button class="calc-btn" onclick="appendVal('0')">0</button>
    <button class="calc-btn" onclick="appendVal('.')">.</button>
    <button class="calc-btn" onclick="calculate()">=</button>
    <button class="calc-btn" onclick="appendVal('+')">+</button>
  </div>

  <br>

  <h3>💸 Compound</h3>
  <input type="number" id="p" placeholder="Principal">
  <input type="number" id="r" placeholder="Rate %">
  <input type="number" id="t" placeholder="Years">
  <button class="calc-btn" onclick="calcCompound()">Calculate</button>
  <div class="result" id="compoundResult"></div>

  <br>

  <h3>💱 FX</h3>
  <input type="number" id="amount" placeholder="Amount">
  <select id="from"><option>INR</option><option>USD</option></select>
  <select id="to"><option>USD</option><option>INR</option></select>
  <button class="calc-btn" onclick="convertFX()">Convert</button>
  <div class="result" id="fx-result"></div>

</div>

<script>

/* ===== SOUND ===== */
const clickSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-modern-click-box-check-1120.mp3");
const successSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-bonus-alert-767.mp3");

/* ===== RIPPLE + SOUND ===== */
document.querySelectorAll('.calc-btn').forEach(btn => {
  btn.addEventListener('click', function(e){

    clickSound.currentTime = 0;
    clickSound.play();

    let ripple = document.createElement("span");
    ripple.className = "ripple";
    this.appendChild(ripple);

    let rect = this.getBoundingClientRect();
    ripple.style.left = (e.clientX - rect.left) + "px";
    ripple.style.top = (e.clientY - rect.top) + "px";

    setTimeout(() => ripple.remove(), 500);
  });
});

/* ===== CALCULATOR ===== */
let expr = '';

function appendVal(v){
  expr += v;
  document.getElementById("display").value = expr;
}

function calculate(){
  try{
    let res = eval(expr);
    document.getElementById("display").value = res;
    expr = res;
    successSound.play();
  }catch{
    document.getElementById("display").value = "Error";
    expr = '';
  }
}

/* ===== COMPOUND ===== */
function calcCompound(){
  let p = parseFloat(document.getElementById('p').value);
  let r = parseFloat(document.getElementById('r').value)/100;
  let t = parseFloat(document.getElementById('t').value);

  let A = p * Math.pow(1 + r, t);
  let gain = A - p;

  let insight = gain > p 
    ? "📈 You're doubling your money 🔥"
    : "⚠️ Try increasing time or rate";

  document.getElementById('compoundResult').innerHTML =
    `₹ ${A.toFixed(2)}<br><small>${insight}</small>`;
}

/* ===== LIVE FX ===== */
async function convertFX(){
  let amount = parseFloat(document.getElementById('amount').value);
  let from = document.getElementById('from').value;
  let to = document.getElementById('to').value;

  let el = document.getElementById('fx-result');

  try{
    let res = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
    let data = await res.json();

    let rate = data.rates[to];
    let result = amount * rate;

    el.innerHTML = `${result.toFixed(2)} ${to}`;
  }catch{
    el.innerHTML = "FX error";
  }
}

/* ===== PARALLAX GALAXY ===== */
const canvas = document.getElementById("galaxyCanvas");
const ctx = canvas.getContext("2d");

let W, H, stars = [];
let mouseX = 0, mouseY = 0;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  stars = [];
  for(let i=0;i<300;i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H,
      size: Math.random()*2
    });
  }
}

window.addEventListener("mousemove", e=>{
  mouseX = (e.clientX/W - 0.5)*20;
  mouseY = (e.clientY/H - 0.5)*20;
});

function draw(){
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,W,H);

  stars.forEach(s=>{
    let px = s.x + mouseX * s.size;
    let py = s.y + mouseY * s.size;

    ctx.beginPath();
    ctx.arc(px, py, s.size, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

resize();
draw();
window.addEventListener("resize", resize);

</script>

</body>
</html>
